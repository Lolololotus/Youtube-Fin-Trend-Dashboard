<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fin-Trend Radar | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <script type="text/javascript" src="https://ssl.gstatic.com/trends_nrtr/3720_RC01/embed_loader.js"></script>
    <style>
        :root {
            --primary-blue: #1F5CFF;
            --primary-dark: #123BA3;
            --bg-color: #f2f4f6;
            --card-bg: #ffffff;
            --text-dark: #191f28;
            --text-gray: #4e5968;
            --text-light: #8b95a1;
            --border-color: #e5e8eb;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-dark);
            min-height: 100vh;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary-blue), #528BFF);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        .title {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-light);
            font-weight: 500;
        }

        /* Card Base */
        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 16px;
            background-color: var(--primary-blue);
            border-radius: 2px;
        }

        /* Top Area: Google Trends */
        .trends-wrapper {
            width: 100%;
            height: 400px;
            border-radius: 12px;
            overflow: hidden;
            background-color: #fafbfc;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed var(--border-color);
        }

        /* Middle Area: Filters */
        .filters-container {
            display: flex;
            gap: 16px;
            align-items: center;
            background-color: #f9fafb;
            padding: 16px 24px;
            border-radius: 12px;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .filter-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-gray);
        }

        .filter-select {
            appearance: none;
            padding: 10px 36px 10px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            color: var(--text-dark);
            background-color: white;
            background-image: url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 12 12' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M2.5 4.5L6 8L9.5 4.5' stroke='%238B95A1' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 14px center;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        .filter-select:focus {
            border-color: var(--primary-blue);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: white;
            padding: 0 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            height: 40px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: var(--text-dark);
            cursor: pointer;
        }

        .checkbox-label input[type="checkbox"] {
            accent-color: var(--primary-blue);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .custom-date-group {
            display: none;
            align-items: center;
            gap: 8px;
        }

        .btn-apply {
            padding: 10px 24px;
            background-color: var(--text-dark);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-left: auto;
        }

        .btn-apply:hover {
            background-color: #000000;
        }

        /* Bottom Area: Report */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 2px;
        }

        .tab {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            position: relative;
            transition: color 0.2s;
            background: none;
            border: none;
        }

        .tab.active {
            color: var(--primary-blue);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 4px;
            background-color: var(--primary-blue);
            border-radius: 4px 4px 0 0;
        }

        .data-table-wrapper {
            overflow-x: auto;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .data-table th,
        .data-table td {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .data-table th {
            background-color: #f9fafb;
            font-weight: 600;
            color: var(--text-gray);
            font-size: 14px;
            white-space: nowrap;
        }

        .data-table td {
            font-size: 15px;
            line-height: 1.6;
            vertical-align: top;
        }

        .col-type {
            font-weight: 700;
            color: var(--primary-dark);
            width: 15%;
        }

        .col-summary {
            width: 35%;
        }

        .col-keywords {
            width: 30%;
        }

        .keyword-tag {
            display: inline-block;
            padding: 4px 8px;
            background-color: #eaf1fa;
            color: var(--primary-blue);
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            margin: 0 4px 4px 0;
        }

        .col-channel {
            width: 20%;
        }

        .channel-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-dark);
            text-decoration: none;
            font-weight: 600;
            padding: 6px 12px;
            background-color: var(--bg-color);
            border-radius: 20px;
            font-size: 13px;
            margin-bottom: 8px;
            transition: background-color 0.2s;
        }

        .channel-link:hover {
            background-color: #e5e8eb;
        }

        .channel-link::before {
            content: '▶';
            color: #ff0000;
            font-size: 10px;
        }

        .engine-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: linear-gradient(90deg, #1a1a2e, #16213e);
            color: #4ade80;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-left: 12px;
            vertical-align: middle;
        }

        .engine-badge::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #4ade80;
            border-radius: 50%;
            box-shadow: 0 0 8px #4ade80;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }

            100% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div class="dashboard-container">
        <header class="header">
            <div class="logo-area">
                <div class="logo-icon">F</div>
                <div>
                    <div class="title">Youtube Fin-Trend Dashboard</div>
                    <div class="subtitle">경제/재테크 유튜브 빅데이터 분석 플랫폼</div>
                </div>
            </div>
            <img src="logo.png" alt="삼성자산운용 X 3PRO" style="height: 28px; object-fit: contain;">
        </header>
        <!-- Top Area: Filters -->
        <div class="card">
            <div class="filters-container">
                <div class="filter-group">
                    <span class="filter-label">기간 설정</span>
                    <select class="filter-select" id="filter-period" onchange="toggleDateInputs()">
                        <option value="7">최근 7일</option>
                        <option value="15" selected>최근 15일</option>
                        <option value="30">최근 30일</option>
                        <option value="custom">자유 선택</option>
                    </select>
                    <div class="custom-date-group" id="custom-dates">
                        <input type="date" id="date-start" class="filter-select" style="padding-right: 12px; background-image: none;">
                        <span>~</span>
                        <input type="date" id="date-end" class="filter-select" style="padding-right: 12px; background-image: none;">
                    </div>
                </div>
                <div class="filter-group">
                    <span class="filter-label">타겟 설정</span>
                    <div class="checkbox-group" id="filter-target">
                        <label class="checkbox-label"><input type="checkbox" value="20" checked> 20대</label>
                        <label class="checkbox-label"><input type="checkbox" value="30" checked> 30대</label>
                        <label class="checkbox-label"><input type="checkbox" value="40" checked> 40대</label>
                    </div>
                </div>
                <button class="btn-apply" onclick="refreshData()">데이터 업데이트</button>
            </div>
        </div>

        <!-- Middle Area: Google Trends -->
        <div class="card">
            <div class="card-title" style="display: flex; justify-content: space-between; align-items: center;">
                실시간 유튜브 검색 트렌드 (Google Trends)
                <div style="display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 500;">
                    <span class="filter-label">비교 키워드 설정</span>
                    <input type="text" id="trends-keywords" class="filter-select"
                        style="width: 200px; padding: 10px 16px; background-image: none;" value="ETF, 연금투자"
                        placeholder="검색어 (쉼표로 구분)">
                </div>
            </div>
            <div class="trends-wrapper" id="trends-container">
                <!-- Google Trends Widget or Local Fallback will be injected here -->
                <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
                <script type="text/javascript">
                    let mockChartInstance = null;

                    async function renderTrends(keywordsStr = "ETF, 연금투자", period = 15) {
                        const container = document.getElementById('trends-container');

                        // Parse keywords
                        const keywords = keywordsStr.split(',').map(k => k.trim()).filter(k => k.length > 0);
                        if (keywords.length === 0) keywords.push('주식'); // fallback

                        // Show loading state
                        if (!document.getElementById('mockChart')) {
                            container.innerHTML = `
                            <div style="width: 100%; height: 100%; position: relative; padding: 24px; box-sizing: border-box;">
                                <div id="trend-loading" style="position: absolute; top: 12px; right: 24px; background: rgba(0,0,0,0.7); color: white; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; z-index: 10;">
                                    데이터 불러오는 중...
                                </div>
                                <canvas id="mockChart"></canvas>
                            </div>
                            `;
                        } else {
                            document.getElementById('trend-loading').innerText = '데이터 불러오는 중...';
                        }

                        const ctx = document.getElementById('mockChart').getContext('2d');

                        let labels = [];
                        let datasets = [];

                        const colors = [
                            { border: '#1F5CFF', bg: 'rgba(31, 92, 255, 0.1)' },
                            { border: '#191f28', bg: 'rgba(25, 31, 40, 0.05)' },
                            { border: '#f04452', bg: 'rgba(240, 68, 82, 0.1)' },
                            { border: '#04c09e', bg: 'rgba(4, 192, 158, 0.1)' },
                            { border: '#ff9800', bg: 'rgba(255, 152, 0, 0.1)' }
                        ];

                        try {
                            if (window.location.protocol !== 'file:') {
                                // Fetch real data from Vercel backend
                                const response = await fetch(`/api/trends?keywords=${encodeURIComponent(keywordsStr)}&period=${period}`);
                                if (!response.ok) throw new Error('Network response was not ok');

                                const data = await response.json();
                                labels = data.labels;
                                datasets = data.datasets.map((ds, index) => ({
                                    label: ds.keyword + ' 유튜브 검색 수',
                                    data: ds.data,
                                    borderColor: colors[index % colors.length].border,
                                    backgroundColor: colors[index % colors.length].bg,
                                    borderWidth: 3,
                                    tension: 0.4,
                                    pointRadius: 0,
                                    pointHoverRadius: 6,
                                    fill: true
                                }));
                                document.getElementById('trend-loading').style.display = 'none';
                            } else {
                                throw new Error('Local environment'); // trigger fallback
                            }
                        } catch (error) {
                            console.log("Using fallback mock data due to error: ", error);
                            document.getElementById('trend-loading').innerText = '⚠️ 로컬/에러 샘플 데이터';

                            // Generate mock data based on period
                            if (period == 7) labels = ['6일 전', '5일 전', '4일 전', '3일 전', '그제', '어제', '오늘'];
                            else if (period == 15) labels = ['14일 전', '12일 전', '10일 전', '8일 전', '6일 전', '4일 전', '2일 전', '오늘'];
                            else labels = ['4주 전', '3주 전', '2주 전', '1주 전', '5일 전', '3일 전', '어제', '오늘'];

                            datasets = keywords.slice(0, 5).map((kw, index) => {
                                const data = Array.from({ length: labels.length }, () => Math.floor(Math.random() * 60) + 20 + (index * 5));
                                data[data.length - 1] += 20; // make the latest data point higher
                                return {
                                    label: kw + ' 유튜브 검색 수',
                                    data: data,
                                    borderColor: colors[index % colors.length].border,
                                    backgroundColor: colors[index % colors.length].bg,
                                    borderWidth: 3,
                                    tension: 0.4,
                                    fill: true
                                };
                            });
                        }

                        if (mockChartInstance) {
                            mockChartInstance.destroy();
                        }

                        mockChartInstance = new Chart(ctx, {
                            type: 'line',
                            data: { labels: labels, datasets: datasets },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                animation: { duration: 800 },
                                interaction: {
                                    mode: 'index',
                                    intersect: false,
                                },
                                plugins: {
                                    legend: { position: 'bottom', labels: { font: { family: 'Pretendard', size: 13, weight: '600' } } }
                                },
                                scales: {
                                    y: { beginAtZero: true, max: 100 },
                                    x: {
                                        ticks: { maxTicksLimit: 15 }
                                    }
                                }
                            }
                        });
                    }

                    window.addEventListener('load', () => renderTrends());
                </script>
            </div>
        </div>

        <!-- Bottom Area: Anti-gravity Engine Report -->
        <div class="card">
            <div class="card-title">
                인기 콘텐츠 분석 리포트
                <span class="engine-badge">Anti-gravity Engine Active</span>
            </div>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('longform', this)">동영상 (Long-form)</button>
                <button class="tab" onclick="switchTab('shorts', this)">쇼츠 (Shorts)</button>
            </div>

            <div class="data-table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>

                            <th>대표 채널 예시</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Data injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

                    summary: "• 정부/지자체 숨은 청년 지원금 1분 신청 방법<br>• 직장인 한 달 100만 원 저축하는 기적의 루틴 공개<br>• 영수증 리뷰, 걷기 앱 등 수익 인증 앱테크 모음",
                    keywords: ["#짠테크", "#청년지원금", "#앱테크", "#돈모으기"],
                    features: "'이거 너 신청했어?' 식의 지인 멘션 및 DM 공유가 폭발하며 2030 세대의 실질적 Action을 유도하는 훅(Hook) 강력",
                    channels: [
                        { name: "김짠부의 재테크", link: "https://www.youtube.com/@kimjjanbu" },
                        { name: "돈립만세", link: "https://www.youtube.com/@donliplib" }
                    ]
                }
            ]
        };

        function renderTable(type) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            const data = engineData[type];

            data.forEach(row => {
                const tr = document.createElement('tr');

                // Format keywords
                const keywordsHtml = row.keywords.map(kw => `<span class="keyword-tag">${kw}</span>`).join('');

                // Format channels
                const channelsHtml = row.channels.map(ch =>
                    `<a href="${ch.link}" target="_blank" class="channel-link">${ch.name}</a><br>`
                ).join('');

                tr.innerHTML = `
                <td class="col-type">${row.type}</td>
                <td class="col-summary">${row.summary}</td>
                <td class="col-keywords">
                    <div style="margin-bottom: 12px;">${keywordsHtml}</div>
                    <div style="font-size: 13.5px; color: #4e5968;"><strong>[특징]</strong> ${row.features}</div>
                </td>
                <td class="col-channel">${channelsHtml}</td>
            `;
                tbody.appendChild(tr);
            });
        }

        function switchTab(type, element) {
            // Update active class on tabs
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            element.classList.add('active');

            // Render data
            renderTable(type);
        }

        async function refreshData() {
            const btn = document.querySelector('.btn-apply');
            const originalText = btn.innerText;
            btn.innerText = '엔진 데이터 분석/수집 중...';
            btn.style.opacity = '0.7';
            btn.disabled = true;

            // Refresh Trends Chart
            const keywordsStr = document.getElementById('trends-keywords').value;
            let period = document.getElementById('filter-period').value;

            if (period === 'custom') {
                const start = document.getElementById('date-start').value;
                const end = document.getElementById('date-end').value;
                if (!start || !end) {
                    alert('시작일과 종료일을 자유 선택 하려면 모두 지정해주세요.');
                    btn.innerText = originalText;
                    btn.style.opacity = '1';
                    btn.disabled = false;
                    return;
                }
                const diffTime = Math.abs(new Date(end) - new Date(start));
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                period = diffDays === 0 ? 1 : diffDays; // avoid 0 period
            }
            
            // Get selected targets
            const targetCheckboxes = document.querySelectorAll('#filter-target input[type="checkbox"]:checked');
            const targets = Array.from(targetCheckboxes).map(cb => cb.value).join(',');
            const targetStr = targets.length > 0 ? targets : 'all'; // fallback if none selected

            renderTrends(keywordsStr, period);

            try {
                if (window.location.protocol !== 'file:') {
                    const response = await fetch(`/api/analyze?keywords=${encodeURIComponent(keywordsStr)}&period=${period}&target=${encodeURIComponent(targetStr)}`);
                    if (!response.ok) throw new Error('API 응답 오류');

                    const newData = await response.json();
                    if (newData && newData.longform && newData.shorts) {
                        engineData = newData; // Update global data
                    }
                } else {
                    // Local environment fallback: just wait a bit (mock data remains)
                    await new Promise(resolve => setTimeout(resolve, 1500));
                }

                // Re-render currently active tab
                const activeTab = document.querySelector('.tab.active');
                const type = activeTab.innerText.includes('동영상') ? 'longform' : 'shorts';
                renderTable(type);

                if (window.location.protocol !== 'file:') {
                    // Automatically fetched and updated
                } else {
                    alert('로컬 환경입니다. (API 호출은 웹 서버에서만 동작합니다)');
                }
            } catch (error) {
                console.error("데이터 수집 실패:", error);
                alert("백엔드 분석 중 오류가 발생했습니다. Vercel 배포 환경을 확인해주세요.");
            } finally {
                btn.innerText = originalText;
                btn.style.opacity = '1';
                btn.disabled = false;
            }
        }

        // Initialize with Long-form data
        window.onload = () => {
            renderTable('longform');
        };
    </script>

</body>

</html>
